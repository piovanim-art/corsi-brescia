<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteo Brescia</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Book.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --text: rgba(255,255,255,.98);
      --muted: rgba(255,255,255,.9);
      --soft: rgba(255,255,255,.76);
      --line: rgba(255,255,255,.22);
      --glass-top: rgba(255,255,255,.17);
      --glass-bottom: rgba(255,255,255,.11);
      --glass-border: rgba(255,255,255,.24);
      --shadow: 0 20px 42px rgba(0,0,0,.17);
      --blur: 16px;
      --radius: 30px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Gotham', sans-serif;
      color: var(--text);
      background: #2f69be;
    }

    body { letter-spacing: -0.015em; }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, #1f58ac 0%, #4176bf 38%, #7098cd 70%, #aec7e5 100%);
      transition: background 1.2s ease;
    }

    /* SCENARI */
    .scene.day-clear {
      background:
        radial-gradient(circle at 83% 15%, rgba(255,241,214,.62), rgba(255,241,214,0) 10%),
        radial-gradient(circle at 88% 88%, rgba(255,210,170,.18), rgba(255,210,170,0) 15%),
        linear-gradient(180deg, #1f58ac 0%, #4176bf 38%, #7098cd 70%, #aec7e5 100%);
    }
    .scene.day-partly {
      background:
        radial-gradient(circle at 82% 16%, rgba(255,239,208,.5), rgba(255,239,208,0) 10%),
        linear-gradient(180deg, #2a67bc 0%, #5588c9 40%, #82a8d4 74%, #bdd3e9 100%);
    }
    .scene.day-cloudy {
      background:
        radial-gradient(circle at 80% 18%, rgba(255,255,255,.18), rgba(255,255,255,0) 10%),
        linear-gradient(180deg, #4d73a8 0%, #6f8fba 38%, #94acca 70%, #c4d1df 100%);
    }
    .scene.rain {
      background:
        linear-gradient(180deg, #435c86 0%, #62799f 36%, #8da0bc 72%, #b8c3d1 100%);
    }
    .scene.storm {
      background:
        radial-gradient(circle at 84% 18%, rgba(184,202,255,.12), rgba(184,202,255,0) 10%),
        linear-gradient(180deg, #1f2c45 0%, #344760 35%, #57697e 70%, #8e9aa9 100%);
    }
    .scene.sunset {
      background:
        radial-gradient(circle at 82% 17%, rgba(255,227,173,.62), rgba(255,227,173,0) 10%),
        radial-gradient(circle at 90% 85%, rgba(255,160,110,.18), rgba(255,160,110,0) 15%),
        linear-gradient(180deg, #5b79c2 0%, #8c8ad0 28%, #d59b82 64%, #f0bb8e 100%);
    }
    .scene.night-clear {
      background:
        radial-gradient(circle at 82% 15%, rgba(171,197,255,.12), rgba(171,197,255,0) 10%),
        linear-gradient(180deg, #07182f 0%, #0b2548 34%, #183760 68%, #284870 100%);
    }
    .scene.night-cloudy {
      background:
        linear-gradient(180deg, #102238 0%, #21374f 38%, #425b73 72%, #677b90 100%);
    }

    .photo-sky,
    .sun-glow,
    .light-beam,
    .clouds-back,
    .clouds-front,
    .mist,
    .stars,
    .shooting-star,
    .rain-layer,
    .flash-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .photo-sky::before,
    .photo-sky::after {
      content: "";
      position: absolute;
      inset: 0;
      mix-blend-mode: screen;
      transition: opacity 1s ease;
    }

    .photo-sky::before {
      background:
        radial-gradient(ellipse at 14% 76%, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 26%),
        radial-gradient(ellipse at 36% 28%, rgba(255,255,255,.11) 0%, rgba(255,255,255,0) 24%),
        radial-gradient(ellipse at 62% 48%, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 22%),
        radial-gradient(ellipse at 84% 58%, rgba(255,255,255,.15) 0%, rgba(255,255,255,0) 20%),
        radial-gradient(ellipse at 90% 88%, rgba(255,222,181,.22) 0%, rgba(255,222,181,0) 18%);
      filter: blur(16px);
      opacity: .95;
    }

    .photo-sky::after {
      background:
        radial-gradient(ellipse at 20% 38%, rgba(255,255,255,.1) 0%, rgba(255,255,255,0) 22%),
        linear-gradient(165deg, transparent 44%, rgba(255,255,255,.18) 49%, transparent 54%);
      opacity: .32;
      transform: translateX(4%);
    }

    .sun-glow::before {
      content: "";
      position: absolute;
      right: 7%;
      top: 8%;
      width: 20vw;
      height: 20vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,247,227,.96) 0%, rgba(255,230,183,.48) 22%, rgba(255,230,183,.15) 42%, rgba(255,230,183,0) 68%);
      filter: blur(8px);
      animation: pulse 12s ease-in-out infinite alternate;
      opacity: 1;
      transition: opacity 1s ease;
    }

    .scene.night-clear .sun-glow::before,
    .scene.night-cloudy .sun-glow::before {
      opacity: .12;
    }

    .light-beam::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(154deg, transparent 44%, rgba(255,255,255,.16) 49%, transparent 53%);
      opacity: .22;
      transform: translateX(8%);
      transition: opacity 1s ease;
    }

    .scene.rain .light-beam::before,
    .scene.storm .light-beam::before,
    .scene.night-clear .light-beam::before,
    .scene.night-cloudy .light-beam::before {
      opacity: .05;
    }

    @keyframes pulse {
      from { transform: scale(1); opacity: .92; }
      to { transform: scale(1.05); opacity: 1; }
    }

    .clouds-back span,
    .clouds-front span {
      position: absolute;
      display: block;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 40%, rgba(255,255,255,.9) 0%, rgba(255,255,255,.58) 36%, rgba(255,255,255,.08) 68%, rgba(255,255,255,0) 82%);
      filter: blur(16px);
      mix-blend-mode: screen;
      animation: drift linear infinite;
      transition: opacity 1s ease;
    }

    .clouds-back span:nth-child(1) { width: 35vw; height: 10vw; top: 16%; left: -12vw; animation-duration: 120s; opacity: .2; }
    .clouds-back span:nth-child(2) { width: 28vw; height: 9vw; top: 44%; left: 24vw; animation-duration: 138s; animation-delay: -22s; opacity: .17; }
    .clouds-back span:nth-child(3) { width: 36vw; height: 10vw; top: 73%; left: 62vw; animation-duration: 126s; animation-delay: -50s; opacity: .18; }

    .clouds-front span:nth-child(1) { width: 28vw; height: 9vw; top: 24%; left: -8vw; animation-duration: 62s; opacity: .25; }
    .clouds-front span:nth-child(2) { width: 34vw; height: 10vw; top: 58%; left: 12vw; animation-duration: 72s; animation-delay: -20s; opacity: .22; }
    .clouds-front span:nth-child(3) { width: 31vw; height: 9vw; top: 82%; left: 68vw; animation-duration: 68s; animation-delay: -34s; opacity: .18; }

    .scene.day-clear .clouds-back span,
    .scene.day-clear .clouds-front span { opacity: .08; }
    .scene.day-partly .clouds-back span,
    .scene.day-partly .clouds-front span { opacity: .18; }
    .scene.day-cloudy .clouds-back span,
    .scene.day-cloudy .clouds-front span,
    .scene.rain .clouds-back span,
    .scene.rain .clouds-front span,
    .scene.night-cloudy .clouds-back span,
    .scene.night-cloudy .clouds-front span { opacity: .28; }
    .scene.storm .clouds-back span,
    .scene.storm .clouds-front span { opacity: .32; }

    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(118vw); }
    }

    .mist {
      top: auto;
      bottom: -3%;
      height: 32%;
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.05) 42%, rgba(255,255,255,.16) 100%);
      filter: blur(24px);
      animation: mistMove 13s ease-in-out infinite alternate;
    }

    @keyframes mistMove {
      from { transform: translateX(-1%); }
      to { transform: translateX(1%); }
    }

    .stars {
      opacity: 0;
      transition: opacity 1s ease;
      background-image:
        radial-gradient(circle at 8% 20%, rgba(255,255,255,.95) 0 1.4px, transparent 1.8px),
        radial-gradient(circle at 18% 10%, rgba(255,255,255,.9) 0 1.1px, transparent 1.7px),
        radial-gradient(circle at 28% 17%, rgba(255,255,255,.82) 0 1px, transparent 1.6px),
        radial-gradient(circle at 39% 8%, rgba(255,255,255,.95) 0 1.3px, transparent 1.8px),
        radial-gradient(circle at 54% 14%, rgba(255,255,255,.9) 0 1.2px, transparent 1.7px),
        radial-gradient(circle at 67% 26%, rgba(255,255,255,.76) 0 1px, transparent 1.6px),
        radial-gradient(circle at 78% 11%, rgba(255,255,255,.96) 0 1.45px, transparent 1.9px),
        radial-gradient(circle at 88% 19%, rgba(255,255,255,.88) 0 1.15px, transparent 1.7px),
        radial-gradient(circle at 12% 34%, rgba(255,255,255,.8) 0 1px, transparent 1.6px),
        radial-gradient(circle at 33% 30%, rgba(255,255,255,.93) 0 1.35px, transparent 1.8px),
        radial-gradient(circle at 52% 32%, rgba(255,255,255,.9) 0 1.15px, transparent 1.7px),
        radial-gradient(circle at 81% 36%, rgba(255,255,255,.84) 0 1.1px, transparent 1.6px);
      animation: twinkle 6s ease-in-out infinite alternate;
    }

    .scene.night-clear .stars,
    .scene.night-cloudy .stars {
      opacity: .8;
    }

    @keyframes twinkle {
      0% { opacity: .45; }
      100% { opacity: .85; }
    }

    .shooting-star::before {
      content: "";
      position: absolute;
      width: 2px;
      height: 2px;
      top: 18%;
      left: 68%;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 10px rgba(255,255,255,.95), -80px 22px 24px rgba(255,255,255,.18);
      opacity: 0;
      transform: rotate(-28deg);
      animation: shoot 12s linear infinite;
    }

    .scene:not(.night-clear) .shooting-star::before {
      display: none;
    }

    @keyframes shoot {
      0%, 82% { opacity: 0; transform: translate(0,0) rotate(-28deg); }
      84% { opacity: 1; }
      92% { opacity: .95; transform: translate(160px, 80px) rotate(-28deg); }
      100% { opacity: 0; transform: translate(220px, 110px) rotate(-28deg); }
    }

    .rain-layer {
      opacity: 0;
      transition: opacity 1s ease;
      background-image: linear-gradient(180deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 70%);
      overflow: hidden;
    }

    .rain-layer::before {
      content: "";
      position: absolute;
      inset: -10% 0 0 0;
      background-image: repeating-linear-gradient(
        100deg,
        rgba(255,255,255,.12) 0 1px,
        transparent 1px 18px
      );
      opacity: .35;
      animation: rainMove 0.8s linear infinite;
    }

    .scene.rain .rain-layer,
    .scene.storm .rain-layer {
      opacity: 1;
    }

    @keyframes rainMove {
      from { transform: translateY(-20px); }
      to { transform: translateY(20px); }
    }

    .flash-layer {
      opacity: 0;
      background: rgba(220,230,255,.18);
      animation: flash 9s linear infinite;
    }

    .scene.storm .flash-layer { opacity: 1; }

    @keyframes flash {
      0%, 94%, 100% { background: rgba(220,230,255,0); }
      95% { background: rgba(220,230,255,.15); }
      96% { background: rgba(220,230,255,0); }
      97% { background: rgba(220,230,255,.08); }
      98% { background: rgba(220,230,255,0); }
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 42px 48px;
      display: grid;
      grid-template-columns: .9fr 1.65fr;
      gap: 44px;
      align-items: center;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 12px;
      min-width: 0;
    }

    .city {
      margin: 0;
      font-size: clamp(70px, 6.1vw, 108px);
      line-height: .92;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,.12);
    }

    .desc {
      margin-top: 16px;
      font-size: clamp(24px, 2vw, 36px);
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,.1);
    }

    .date {
      margin-top: 10px;
      font-size: clamp(20px, 1.5vw, 28px);
      color: var(--soft);
      text-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .temp {
      margin-top: 24px;
      font-size: clamp(180px, 16vw, 280px);
      line-height: .8;
      letter-spacing: -0.09em;
      font-weight: 400;
      text-shadow: 0 4px 18px rgba(0,0,0,.08);
    }

    .meta {
      margin-top: 12px;
      font-size: clamp(24px, 1.9vw, 34px);
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .meta.small {
      margin-top: 8px;
      font-size: clamp(22px, 1.65vw, 30px);
    }

    .astro {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .moon-line,
    .sun-line {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: clamp(22px, 1.75vw, 30px);
    }

    .moon-line img,
    .sun-line img,
    .hour-item img,
    .day-row img {
      filter: brightness(0) invert(1) drop-shadow(0 4px 10px rgba(0,0,0,.08));
    }

    .moon-line img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      display: block;
    }

    .sun-line img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 28px;
      justify-content: center;
      min-width: 0;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass-top), var(--glass-bottom));
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(var(--blur)) saturate(120%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(120%);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,0) 38%);
      pointer-events: none;
    }

    .hour-card {
      padding: 18px 28px 20px;
      min-height: 208px;
    }

    .hour-top,
    .hour-bottom {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      text-align: center;
      align-items: center;
    }

    .hour-top {
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
      font-size: clamp(20px, 1.5vw, 28px);
      color: var(--muted);
    }

    .hour-bottom {
      padding-top: 14px;
      gap: 4px;
    }

    .hour-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .hour-item img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: block;
    }

    .hour-temp {
      font-size: clamp(26px, 2vw, 36px);
      color: var(--muted);
    }

    .day-card {
      padding: 18px 30px 18px;
      min-height: 380px;
    }

    .day-head,
    .day-row {
      display: grid;
      grid-template-columns: 1.18fr 76px .62fr .62fr .82fr;
      align-items: center;
      gap: 12px;
    }

    .day-head {
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--line);
      font-size: clamp(20px, 1.5vw, 26px);
      color: var(--muted);
    }

    .day-body {
      padding-top: 14px;
      display: grid;
      gap: 14px;
    }

    .day-row {
      min-height: 50px;
      font-size: clamp(22px, 1.65vw, 30px);
      color: var(--muted);
    }

    .day-row img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      display: block;
    }

    @media (max-aspect-ratio: 1/1) {
      .wrap {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        gap: 24px;
        align-items: start;
      }

      .left {
        padding-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="scene day-partly" id="scene">
    <div class="photo-sky"></div>
    <div class="sun-glow"></div>
    <div class="light-beam"></div>
    <div class="clouds-back"><span></span><span></span><span></span></div>
    <div class="clouds-front"><span></span><span></span><span></span></div>
    <div class="mist"></div>
    <div class="stars"></div>
    <div class="shooting-star"></div>
    <div class="rain-layer"></div>
    <div class="flash-layer"></div>

    <main class="wrap">
      <section class="left">
        <h1 class="city">Brescia</h1>
        <div class="desc" id="currentDesc">Parzialmente nuvoloso</div>
        <div class="date" id="dateLine"></div>
        <div class="temp" id="currentTemp">23°</div>
        <div class="meta" id="minMaxLine">H: 24° · L: 12°</div>
        <div class="meta small" id="humidityLine">Umidità 58%</div>

        <div class="astro">
          <div class="moon-line">
            <img src="./icons/moon.svg" alt="Luna" />
            <span id="moonLabel">Luna crescente</span>
          </div>
          <div class="sun-line">
            <img src="./icons/sun.svg" alt="Sole" />
            <span id="sunLine"></span>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="card hour-card">
          <div class="hour-top" id="hourTop"></div>
          <div class="hour-bottom" id="hourBottom"></div>
        </div>

        <div class="card day-card">
          <div class="day-head">
            <div id="dayTitle">Giovedì</div>
            <div></div>
            <div>MIN</div>
            <div>MAX</div>
            <div></div>
          </div>
          <div class="day-body" id="dayBody"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const weatherData = {
      location: 'Brescia',
      current: {
        condition: 'Parzialmente nuvoloso',
        temp: 23,
        high: 24,
        low: 12,
        humidity: 58,
        moonPhase: 'Luna crescente',
        sunrise: '06:28',
        sunset: '19:51'
      },
      hourly: [
        { time: 'Adesso', icon: 'partly-cloudy.svg', temp: 23 },
        { time: '17', icon: 'partly-cloudy.svg', temp: 24 },
        { time: '18', icon: 'sun.svg', temp: 24 },
        { time: '19', icon: 'sun.svg', temp: 23 }
      ],
      daily: [
        { day: 'Giovedì', icon: 'cloud.svg', min: 13, max: 20 },
        { day: 'Venerdì', icon: 'thunder.svg', min: 14, max: 20 },
        { day: 'Sabato', icon: 'sun.svg', min: 11, max: 23 },
        { day: 'Domenica', icon: 'partly-cloudy.svg', min: 12, max: 24 },
        { day: 'Lunedì', icon: 'partly-cloudy.svg', min: 12, max: 23 }
      ]
    };

    function normalize(s) {
      return (s || '').toLowerCase();
    }

    function applyScene() {
      const scene = document.getElementById('scene');
      const now = new Date();
      const mins = now.getHours() * 60 + now.getMinutes();
      const sunrise = 6 * 60 + 28;
      const sunset = 19 * 60 + 51;
      const c = normalize(weatherData.current.condition);
      let cls = 'day-partly';

      const isStorm = c.includes('tempor') || c.includes('thunder');
      const isRain = c.includes('piogg') || c.includes('rain');
      const isCloudy = c.includes('nuvol') && !c.includes('parzial');
      const isPartly = c.includes('parzial') || c.includes('poco');
      const isClear = c.includes('sereno') || c.includes('sole');

      if (mins >= sunset - 35 && mins < sunset + 25) {
        cls = 'sunset';
      } else if (mins >= sunrise && mins < sunset) {
        if (isStorm) cls = 'storm';
        else if (isRain) cls = 'rain';
        else if (isCloudy) cls = 'day-cloudy';
        else if (isClear) cls = 'day-clear';
        else cls = 'day-partly';
      } else {
        if (isCloudy || isRain || isStorm) cls = 'night-cloudy';
        else cls = 'night-clear';
      }

      scene.className = 'scene ' + cls;
    }

    function updateDateLine() {
      const now = new Date();
      const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
      const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('dateLine').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} · ${hh}:${mm}`;
    }

    function updateSunLine() {
      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();
      const [srH, srM] = weatherData.current.sunrise.split(':').map(Number);
      const [ssH, ssM] = weatherData.current.sunset.split(':').map(Number);
      const sunrise = srH * 60 + srM;
      const sunset = ssH * 60 + ssM;
      document.getElementById('sunLine').textContent = current >= sunset ? `Alba ${weatherData.current.sunrise}` : `Tramonto ${weatherData.current.sunset}`;
    }

    function renderStatic() {
      document.getElementById('currentDesc').textContent = weatherData.current.condition;
      document.getElementById('currentTemp').textContent = `${weatherData.current.temp}°`;
      document.getElementById('minMaxLine').textContent = `H: ${weatherData.current.high}° · L: ${weatherData.current.low}°`;
      document.getElementById('humidityLine').textContent = `Umidità ${weatherData.current.humidity}%`;
      document.getElementById('moonLabel').textContent = weatherData.current.moonPhase;
      document.getElementById('dayTitle').textContent = weatherData.daily[0].day;

      const hourTop = document.getElementById('hourTop');
      const hourBottom = document.getElementById('hourBottom');
      hourTop.innerHTML = '';
      hourBottom.innerHTML = '';
      weatherData.hourly.forEach(item => {
        const top = document.createElement('div');
        top.textContent = item.time;
        hourTop.appendChild(top);

        const bottom = document.createElement('div');
        bottom.className = 'hour-item';
        bottom.innerHTML = `<img src="./icons/${item.icon}" alt=""><div class="hour-temp">${item.temp}°</div>`;
        hourBottom.appendChild(bottom);
      });

      const body = document.getElementById('dayBody');
      body.innerHTML = '';
      weatherData.daily.forEach(item => {
        const row = document.createElement('div');
        row.className = 'day-row';
        row.innerHTML = `
          <div>${item.day}</div>
          <div><img src="./icons/${item.icon}" alt=""></div>
          <div>${item.min}°</div>
          <div>${item.max}°</div>
          <div></div>
        `;
        body.appendChild(row);
      });
    }

    renderStatic();
    updateDateLine();
    updateSunLine();
    applyScene();
    setInterval(updateDateLine, 30000);
    setInterval(updateSunLine, 60000);
    setInterval(applyScene, 60000);

    (function () {
      const url = new URL(window.location.href);
      if (!url.searchParams.get('v')) {
        url.searchParams.set('v', Date.now());
        window.location.replace(url.toString());
      }
    })();
  </script>
</body>
</html>
