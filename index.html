<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Meteo Brescia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: #0b1a2a;
}

/* LEFT */

.left {
  position: absolute;
  left: 5%;
  top: 8%;
}

.city {
  font-size: 80px;
  font-weight: bold;
}

.desc {
  font-size: 28px;
  margin-top: 10px;
}

.date {
  opacity: 0.7;
  margin-top: 5px;
}

.temp {
  font-size: 150px;
  margin-top: 20px;
}

.minmax {
  font-size: 24px;
  opacity: 0.8;
}

.bottom-left {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.line {
  display: flex;
  align-items: center;
  gap: 10px;
}

.line img {
  width: 22px;
}

/* UV */
.uv.low img { filter: invert(60%) sepia(60%) saturate(300%) hue-rotate(80deg); }
.uv.medium img { filter: invert(80%) sepia(80%) saturate(400%) hue-rotate(20deg); }
.uv.high img { filter: invert(40%) sepia(100%) saturate(500%) hue-rotate(0deg); }

/* AIR */
.air.good img { filter: invert(60%) sepia(60%) saturate(300%) hue-rotate(80deg); }
.air.medium img { filter: invert(80%) sepia(80%) saturate(400%) hue-rotate(20deg); }
.air.bad img { filter: invert(40%) sepia(100%) saturate(500%) hue-rotate(0deg); }

/* RIGHT */

.right {
  position: absolute;
  right: 5%;
  top: 12%;
}

/* BOX */

.box {
  background: rgba(40,60,80,0.6);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 20px;
  margin-bottom: 20px;
}

/* HOURS */

.row {
  display: flex;
  gap: 30px;
  align-items: center;
}

.hour {
  text-align: center;
}

.hour img {
  width: 50px;
}

.hour-now img {
  width: 90px;
}

/* ASTRO */

.astro {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* MOON */

.moon-box {
  display: flex;
  align-items: center;
  gap: 15px;
}

.moon-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: black;
  position: relative;
  overflow: hidden;
}

.moon-img {
  width: 100%;
  height: 100%;
  background: url('./images/moon.jpg') center/cover;
}

.moon-shadow {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: black;
}

.moon-text {
  display: flex;
  flex-direction: column;
}

.moon-title {
  font-size: 28px;
}

.moon-sub {
  font-size: 16px;
  opacity: 0.7;
}

/* ZODIAC */

.zodiac {
  display: flex;
  align-items: center;
  gap: 15px;
}

.zodiac-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
}

.zodiac-circle img {
  width: 50px;
  filter: invert(1);
}

.zodiac-text {
  display: flex;
  flex-direction: column;
}

.zodiac-title {
  font-size: 28px;
}

.zodiac-sub {
  font-size: 16px;
  opacity: 0.7;
}

</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
  <div class="city">BRESCIA</div>
  <div class="desc">Parzialmente nuvoloso</div>
  <div class="date">Sabato 11 Aprile</div>

  <div class="temp">20°</div>
  <div class="minmax">Min 11° • Max 21°</div>

  <div class="bottom-left">

    <div class="line">
      <img src="./icons/thermometer.svg">
      <span>Percepita 20°</span>
    </div>

    <div class="line">
      <img src="./icons/humidity.svg">
      <span>Umidità 47%</span>
    </div>

    <div class="line uv" id="uvBox">
      <img src="./icons/sun.svg">
      <span id="uvText">UV 5</span>
    </div>

    <div class="line air" id="airBox">
      <img src="./icons/wind.svg">
      <span>Aria</span>
    </div>

    <div class="line">
      <img src="./icons/sunset.svg" id="sunIcon">
      <span id="sunText">Tramonto 19:59</span>
    </div>

  </div>
</div>

<!-- RIGHT -->
<div class="right">

  <!-- HOURS -->
  <div class="box">
    <div class="row">

      <div class="hour hour-now">
        <div>Adesso</div>
        <img src="./icons/partly-cloudy.svg">
      </div>

      <div class="hour">
        <div>16</div>
        <img src="./icons/sun.svg">
        <div>21°</div>
      </div>

      <div class="hour">
        <div>17</div>
        <img src="./icons/sun.svg">
        <div>21°</div>
      </div>

      <div class="hour">
        <div>18</div>
        <img src="./icons/cloud.svg">
        <div>20°</div>
      </div>

      <div class="hour">
        <div>19</div>
        <img src="./icons/cloud.svg">
        <div>20°</div>
      </div>

    </div>
  </div>

  <!-- ASTRO -->
  <div class="box astro">

    <div class="moon-box">
      <div class="moon-circle">
        <div class="moon-img"></div>
        <div class="moon-shadow" id="moonShadow"></div>
      </div>

      <div class="moon-text">
        <div class="moon-title">Ultimo Quarto</div>
        <div class="moon-sub">Fase Lunare</div>
      </div>
    </div>

    <div class="zodiac">
      <div class="zodiac-circle">
        <img src="./zodiac/zodiac-aries.svg">
      </div>

      <div class="zodiac-text">
        <div class="zodiac-title">Aries</div>
        <div class="zodiac-sub">Segno zodiacale</div>
      </div>
    </div>

  </div>

</div>

<script>

/* UV */
const uv = 5;
const uvBox = document.getElementById('uvBox');

if (uv <= 2) uvBox.classList.add('low');
else if (uv <= 5) uvBox.classList.add('medium');
else uvBox.classList.add('high');

/* AIR */
const air = "good";
document.getElementById('airBox').classList.add(air);

/* ALBA/TRAMONTO */
const hour = new Date().getHours();

if(hour < 12){
  document.getElementById('sunIcon').src = './icons/sunrise.svg';
  document.getElementById('sunText').innerText = 'Alba 06:42';
}

/* LUNA DINAMICA */
document.getElementById('moonShadow').style.left = "50%";

</script>

</body>
</html>
