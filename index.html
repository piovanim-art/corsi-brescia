<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteo Brescia</title>

  <!-- NO CACHE -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Book.otf');
      font-weight: 400;
    }

    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Bold.otf');
      font-weight: 700;
    }

    body {
      margin: 0;
      font-family: 'Gotham', sans-serif;
      color: white;
      background: linear-gradient(180deg, #2f6fd3, #9cc3ea);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      height: 100vh;
      padding: 40px;
      gap: 40px;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .city {
      font-size: 70px;
      font-weight: 700;
    }

    .temp {
      font-size: 180px;
      font-weight: 300;
    }

    .meta {
      font-size: 24px;
      opacity: 0.9;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.2);
      border-radius: 25px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .hourly {
      display: grid;
      grid-template-columns: repeat(5,1fr);
      text-align: center;
    }

    .daily-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
      padding: 10px 0;
    }

  </style>
</head>
<body>

<div class="layout">

  <div class="left">
    <div class="city">Brescia</div>
    <div class="meta">Parzialmente nuvoloso</div>
    <div class="meta" id="time"></div>

    <div class="temp">23°</div>

    <div class="meta">Min 12° · Max 24°</div>
    <div class="meta">Umidità 58%</div>

    <div class="meta">🌔 Luna crescente</div>
    <div class="meta" id="sunEvent"></div>
  </div>

  <div class="right">

    <div class="card">
      <div class="hourly">
        <div>Adesso</div>
        <div>17</div>
        <div>18</div>
        <div>19</div>
        <div>20</div>

        <div>23°</div>
        <div>24°</div>
        <div>24°</div>
        <div>23°</div>
        <div>21°</div>
      </div>
    </div>

    <div class="card">
      <div class="daily-row">
        <div></div><div></div><div>Min</div><div>Max</div><div>Vento</div>
      </div>

      <div class="daily-row"><div>Giovedì</div><div>☁️</div><div>13°</div><div>20°</div><div>12 km/h</div></div>
      <div class="daily-row"><div>Venerdì</div><div>⛈</div><div>14°</div><div>20°</div><div>18 km/h</div></div>
      <div class="daily-row"><div>Sabato</div><div>☀️</div><div>11°</div><div>23°</div><div>9 km/h</div></div>
      <div class="daily-row"><div>Domenica</div><div>⛅</div><div>12°</div><div>24°</div><div>10 km/h</div></div>
    </div>

  </div>

</div>

<script>

// ORA DINAMICA
function updateTime() {
  const now = new Date();
  document.getElementById('time').innerText = now.toLocaleString('it-IT', {
    weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
  });
}

// ALBA / TRAMONTO DINAMICO
function updateSun() {
  const now = new Date();
  const sunset = 19 * 60 + 51;
  const current = now.getHours()*60 + now.getMinutes();

  document.getElementById('sunEvent').innerText =
    current > sunset ? "Alba 06:28" : "Tramonto 19:51";
}

updateTime();
updateSun();
setInterval(updateTime, 60000);

// CACHE BUSTER AUTOMATICO
(function () {
  const url = new URL(window.location.href);
  if (!url.searchParams.get('v')) {
    url.searchParams.set('v', Date.now());
    window.location.replace(url);
  }
})();

</script>

</body>
</html>
