<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteo Brescia</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Book.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --text: rgba(255,255,255,.98);
      --muted: rgba(255,255,255,.9);
      --soft: rgba(255,255,255,.78);
      --line: rgba(255,255,255,.22);
      --glass-top: rgba(255,255,255,.17);
      --glass-bottom: rgba(255,255,255,.11);
      --glass-border: rgba(255,255,255,.24);
      --shadow: 0 20px 42px rgba(0,0,0,.17);
      --blur: 16px;
      --radius: 30px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Gotham', sans-serif;
      color: var(--text);
      background: #2f69be;
    }

    body { letter-spacing: -0.015em; }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 83% 15%, rgba(255,241,214,.62), rgba(255,241,214,0) 10%),
        radial-gradient(circle at 88% 88%, rgba(255,210,170,.18), rgba(255,210,170,0) 15%),
        linear-gradient(180deg, #1f58ac 0%, #4176bf 38%, #7098cd 70%, #aec7e5 100%);
    }

    .photo-sky,
    .sun-glow,
    .light-beam,
    .clouds-back,
    .clouds-front,
    .mist {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .photo-sky::before,
    .photo-sky::after {
      content: "";
      position: absolute;
      inset: 0;
      mix-blend-mode: screen;
    }

    .photo-sky::before {
      background:
        radial-gradient(ellipse at 14% 76%, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 26%),
        radial-gradient(ellipse at 36% 28%, rgba(255,255,255,.11) 0%, rgba(255,255,255,0) 24%),
        radial-gradient(ellipse at 62% 48%, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 22%),
        radial-gradient(ellipse at 84% 58%, rgba(255,255,255,.15) 0%, rgba(255,255,255,0) 20%),
        radial-gradient(ellipse at 90% 88%, rgba(255,222,181,.22) 0%, rgba(255,222,181,0) 18%);
      filter: blur(16px);
      opacity: .95;
    }

    .photo-sky::after {
      background:
        radial-gradient(ellipse at 20% 38%, rgba(255,255,255,.1) 0%, rgba(255,255,255,0) 22%),
        linear-gradient(165deg, transparent 44%, rgba(255,255,255,.18) 49%, transparent 54%);
      opacity: .32;
      transform: translateX(4%);
    }

    .sun-glow::before {
      content: "";
      position: absolute;
      right: 7%;
      top: 8%;
      width: 20vw;
      height: 20vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,247,227,.96) 0%, rgba(255,230,183,.48) 22%, rgba(255,230,183,.15) 42%, rgba(255,230,183,0) 68%);
      filter: blur(8px);
      animation: pulse 12s ease-in-out infinite alternate;
    }

    .light-beam::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(154deg, transparent 44%, rgba(255,255,255,.16) 49%, transparent 53%);
      opacity: .22;
      transform: translateX(8%);
    }

    @keyframes pulse {
      from { transform: scale(1); opacity: .92; }
      to { transform: scale(1.05); opacity: 1; }
    }

    .clouds-back span,
    .clouds-front span {
      position: absolute;
      display: block;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 40%, rgba(255,255,255,.9) 0%, rgba(255,255,255,.58) 36%, rgba(255,255,255,.08) 68%, rgba(255,255,255,0) 82%);
      filter: blur(16px);
      mix-blend-mode: screen;
      animation: drift linear infinite;
    }

    .clouds-back span:nth-child(1) { width: 35vw; height: 10vw; top: 16%; left: -12vw; animation-duration: 120s; opacity: .2; }
    .clouds-back span:nth-child(2) { width: 28vw; height: 9vw; top: 44%; left: 24vw; animation-duration: 138s; animation-delay: -22s; opacity: .17; }
    .clouds-back span:nth-child(3) { width: 36vw; height: 10vw; top: 73%; left: 62vw; animation-duration: 126s; animation-delay: -50s; opacity: .18; }

    .clouds-front span:nth-child(1) { width: 28vw; height: 9vw; top: 24%; left: -8vw; animation-duration: 62s; opacity: .25; }
    .clouds-front span:nth-child(2) { width: 34vw; height: 10vw; top: 58%; left: 12vw; animation-duration: 72s; animation-delay: -20s; opacity: .22; }
    .clouds-front span:nth-child(3) { width: 31vw; height: 9vw; top: 82%; left: 68vw; animation-duration: 68s; animation-delay: -34s; opacity: .18; }

    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(118vw); }
    }

    .mist {
      top: auto;
      bottom: -3%;
      height: 32%;
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.05) 42%, rgba(255,255,255,.16) 100%);
      filter: blur(24px);
      animation: mistMove 13s ease-in-out infinite alternate;
    }

    @keyframes mistMove {
      from { transform: translateX(-1%); }
      to { transform: translateX(1%); }
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 42px 48px;
      display: grid;
      grid-template-columns: .9fr 1.65fr;
      gap: 44px;
      align-items: center;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 12px;
      min-width: 0;
    }

    .city {
      margin: 0;
      font-size: clamp(70px, 6.1vw, 108px);
      line-height: .92;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,.12);
    }

    .desc {
      margin-top: 16px;
      font-size: clamp(24px, 2vw, 36px);
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,.1);
    }

    .date {
      margin-top: 10px;
      font-size: clamp(20px, 1.5vw, 28px);
      color: var(--soft);
      text-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .temp {
      margin-top: 24px;
      font-size: clamp(180px, 16vw, 280px);
      line-height: .8;
      letter-spacing: -0.09em;
      font-weight: 400;
      text-shadow: 0 4px 18px rgba(0,0,0,.08);
    }

    .meta {
      margin-top: 12px;
      font-size: clamp(24px, 1.9vw, 34px);
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .meta.small {
      margin-top: 8px;
      font-size: clamp(22px, 1.65vw, 30px);
    }

    .astro {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .moon-line,
    .sun-line {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: clamp(22px, 1.75vw, 30px);
    }

    .moon-line img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 5px 12px rgba(0,0,0,.12));
    }

    .sun-line img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 28px;
      justify-content: center;
      min-width: 0;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass-top), var(--glass-bottom));
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(var(--blur)) saturate(120%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(120%);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,0) 38%);
      pointer-events: none;
    }

    .hour-card {
      padding: 18px 28px 20px;
      min-height: 208px;
    }

    .hour-top,
    .hour-bottom {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      text-align: center;
      align-items: center;
    }

    .hour-top {
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
      font-size: clamp(20px, 1.5vw, 28px);
      color: var(--muted);
    }

    .hour-bottom {
      padding-top: 14px;
      gap: 4px;
    }

    .hour-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .hour-item img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.08));
    }

    .hour-temp {
      font-size: clamp(26px, 2vw, 36px);
      color: var(--muted);
    }

    .day-card {
      padding: 18px 30px 18px;
      min-height: 380px;
    }

    .day-head,
    .day-row {
      display: grid;
      grid-template-columns: 1.18fr 76px .62fr .62fr .82fr;
      align-items: center;
      gap: 12px;
    }

    .day-head {
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--line);
      font-size: clamp(20px, 1.5vw, 26px);
      color: var(--muted);
    }

    .day-body {
      padding-top: 14px;
      display: grid;
      gap: 14px;
    }

    .day-row {
      min-height: 50px;
      font-size: clamp(22px, 1.65vw, 30px);
      color: var(--muted);
    }

    .day-row img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,.08));
    }

    @media (max-aspect-ratio: 1/1) {
      .wrap {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        gap: 24px;
        align-items: start;
      }

      .left {
        padding-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="photo-sky"></div>
    <div class="sun-glow"></div>
    <div class="light-beam"></div>
    <div class="clouds-back"><span></span><span></span><span></span></div>
    <div class="clouds-front"><span></span><span></span><span></span></div>
    <div class="mist"></div>

    <main class="wrap">
      <section class="left">
        <h1 class="city">Brescia</h1>
        <div class="desc">Parzialmente nuvoloso</div>
        <div class="date" id="dateLine"></div>
        <div class="temp">23°</div>
        <div class="meta">Min 12° · Max 24°</div>
        <div class="meta small">Umidità 58%</div>

        <div class="astro">
          <div class="moon-line">
            <img src="./icons/moon.svg" alt="Luna">
            <span>Luna crescente</span>
          </div>
          <div class="sun-line">
            <img src="./icons/sun.svg" alt="Sole">
            <span id="sunLine"></span>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="card hour-card">
          <div class="hour-top">
            <div>Adesso</div>
            <div>17</div>
            <div>18</div>
            <div>19</div>
            <div>20</div>
          </div>
          <div class="hour-bottom">
            <div class="hour-item"><img src="./icons/partly-cloudy.svg" alt=""><div class="hour-temp">23°</div></div>
            <div class="hour-item"><img src="./icons/partly-cloudy.svg" alt=""><div class="hour-temp">24°</div></div>
            <div class="hour-item"><img src="./icons/sun.svg" alt=""><div class="hour-temp">24°</div></div>
            <div class="hour-item"><img src="./icons/sun.svg" alt=""><div class="hour-temp">23°</div></div>
            <div class="hour-item"><img src="./icons/partly-cloudy.svg" alt=""><div class="hour-temp">21°</div></div>
          </div>
        </div>

        <div class="card day-card">
          <div class="day-head">
            <div></div>
            <div></div>
            <div>Min</div>
            <div>Max</div>
            <div>Vento</div>
          </div>
          <div class="day-body">
            <div class="day-row"><div>Giovedì</div><div><img src="./icons/cloud.svg" alt=""></div><div>13°</div><div>20°</div><div>12 km/h</div></div>
            <div class="day-row"><div>Venerdì</div><div><img src="./icons/thunder.svg" alt=""></div><div>14°</div><div>20°</div><div>18 km/h</div></div>
            <div class="day-row"><div>Sabato</div><div><img src="./icons/sun.svg" alt=""></div><div>11°</div><div>23°</div><div>9 km/h</div></div>
            <div class="day-row"><div>Domenica</div><div><img src="./icons/partly-cloudy.svg" alt=""></div><div>12°</div><div>24°</div><div>10 km/h</div></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    function updateDateLine() {
      const now = new Date();
      const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
      const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('dateLine').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} · ${hh}:${mm}`;
    }

    function updateSunLine() {
      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();
      const sunset = 19 * 60 + 51;
      document.getElementById('sunLine').textContent = current >= sunset ? 'Alba 06:28' : 'Tramonto 19:51';
    }

    updateDateLine();
    updateSunLine();
    setInterval(updateDateLine, 30000);
    setInterval(updateSunLine, 60000);

    (function () {
      const url = new URL(window.location.href);
      if (!url.searchParams.get('v')) {
        url.searchParams.set('v', Date.now());
        window.location.replace(url.toString());
      }
    })();
  </script>
</body>
</html>
