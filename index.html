<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteo Brescia</title>

  <style>
    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Book.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'GothamBlack';
      src: url('./fonts/Gotham-Black.otf') format('opentype');
      font-weight: 900;
      font-style: normal;
    }

    @font-face {
      font-family: 'GothamXLight';
      src: url('./fonts/Gotham-XLight.otf') format('opentype');
      font-weight: 200;
      font-style: normal;
    }

    :root {
      --text: rgba(255,255,255,0.98);
      --muted: rgba(255,255,255,0.93);
      --soft: rgba(255,255,255,0.82);
      --glass: rgba(255,255,255,0.075);
      --glass-2: rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.16);
      --line: rgba(255,255,255,0.12);
      --shadow: 0 16px 40px rgba(0,0,0,0.18);
      --radius: 30px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #07111e;
      color: var(--text);
      font-family: 'Gotham', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      aspect-ratio: 16 / 9;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #07111e;
    }

    .bg {
      position: absolute;
      inset: -5%;
      z-index: 0;
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      transform: scale(1.08);
      will-change: transform;
      transition: background-image 0.8s ease;
      animation: bgMove 36s ease-in-out infinite alternate;
    }

    @keyframes bgMove {
      0% {
        transform: scale(1.08) translate3d(0%, 0%, 0);
      }
      50% {
        transform: scale(1.13) translate3d(-2.2%, -1.2%, 0);
      }
      100% {
        transform: scale(1.10) translate3d(1.7%, 1.3%, 0);
      }
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 78% 16%, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.03) 14%, rgba(255,255,255,0) 28%),
        linear-gradient(90deg, rgba(7,12,22,0.16) 0%, rgba(7,12,22,0.06) 30%, rgba(7,12,22,0.02) 55%, rgba(7,12,22,0.04) 100%),
        linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(0,0,0,0.10) 100%);
    }

    .stage {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 35% 65%;
      gap: 1.4vw;
      align-items: center;
      padding: 4vh 3vw;
    }

    /* SINISTRA */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 34vw;
      padding-left: 0.8vw;
    }

    .city {
      margin: 0;
      font-family: 'GothamBlack', 'Gotham', Arial, sans-serif;
      font-size: clamp(72px, 5.8vw, 126px);
      line-height: 0.9;
      letter-spacing: -0.06em;
      text-shadow: 0 3px 14px rgba(0,0,0,0.16);
    }

    .condition {
      margin-top: 2vh;
      font-size: clamp(26px, 2vw, 40px);
      line-height: 1.16;
      color: var(--muted);
      text-shadow: 0 2px 10px rgba(0,0,0,0.12);
    }

    .date {
      margin-top: 1vh;
      font-size: clamp(18px, 1.35vw, 27px);
      line-height: 1.2;
      color: var(--soft);
      text-shadow: 0 2px 10px rgba(0,0,0,0.10);
      text-transform: capitalize;
    }

    .temp-main {
      margin-top: 2vh;
      font-family: 'GothamXLight', 'Gotham', Arial, sans-serif;
      font-weight: 200;
      font-size: clamp(185px, 14.5vw, 300px);
      line-height: 0.80;
      letter-spacing: -0.11em;
      text-shadow: 0 6px 20px rgba(0,0,0,0.14);
    }

    .minmax-line {
      margin-top: 0.5vh;
      font-size: clamp(29px, 1.95vw, 40px);
      line-height: 1.12;
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }

    .left-list {
      width: 100%;
      margin-top: 2vh;
      display: flex;
      flex-direction: column;
      gap: 0.95vh;
    }

    .left-item {
      display: grid;
      grid-template-columns: 36px auto;
      align-items: center;
      gap: 14px;
      line-height: 1;
      font-size: clamp(21px, 1.45vw, 29px);
      color: var(--muted);
    }

    .left-item img {
      width: 30px;
      height: 30px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      filter: brightness(0) invert(1);
      opacity: 0.96;
      transform: translateY(1px);
    }

    .left-item span {
      line-height: 1.15;
      text-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }

    .left-item.zodiac {
      grid-template-columns: 36px auto;
    }

    .zodiac-symbol {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      line-height: 1;
      color: var(--muted);
      transform: translateY(1px);
    }

    /* DESTRA */
    .right {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 2.2vh;
      padding-top: 16vh;
      padding-bottom: 2.8vh;
      padding-right: 1.8vw; /* rientra di più a sinistra */
    }

    .card {
      width: 85%;
      margin-left: auto;
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass), var(--glass-2));
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(112%);
      -webkit-backdrop-filter: blur(14px) saturate(112%);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015) 42%, rgba(255,255,255,0) 100%);
    }

    .hours-card {
      padding: 2.1vh 1.25vw 1.85vh;
    }

    .days-card {
      padding: 2.05vh 1.15vw 1.65vh;
    }

    /* TABELLA ORE */
    .hours-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: start;
      justify-items: center;
      text-align: center;
      column-gap: 0;
    }

    .hour-col {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      padding: 0 0.2vw;
    }

    .hour-col + .hour-col::before {
      content: "";
      position: absolute;
      left: 0;
      top: 2.8vh;
      bottom: 0.7vh;
      width: 1px;
      background: rgba(255,255,255,0.08);
    }

    .hour-label {
      min-height: 1.4em;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1vh;
      font-size: clamp(18px, 1.2vw, 27px);
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .hour-icon {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hour-icon img {
      width: 46px;
      height: 46px;
      object-fit: contain;
      display: block;
      filter: brightness(0) invert(1);
      transform: translateY(1px);
    }

    .hour-temp {
      margin-top: 1.05vh;
      min-height: 1.1em;
      font-size: clamp(28px, 2vw, 40px);
      line-height: 1;
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .hour-wind {
      margin-top: 0.85vh;
      min-height: 1.1em;
      font-size: clamp(14px, 0.98vw, 18px);
      line-height: 1;
      color: rgba(255,255,255,0.78);
      white-space: nowrap;
    }

    /* TABELLA GIORNI */
    .days-grid {
      display: grid;
      /* Colonne allineate con la logica della tabella sopra */
      grid-template-columns: 1.8fr 1fr 1fr 1fr 1fr;
      align-items: center;
      width: 100%;
    }

    .days-head {
      padding: 0.2vh 0.5vw 1.2vh;
      font-size: clamp(18px, 1.2vw, 24px);
      color: var(--muted);
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .days-head.left-empty {
      color: transparent;
      user-select: none;
    }

    .day-cell {
      min-height: 5.1vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.65vh 0.5vw;
      border-top: 1px solid var(--line);
      font-size: clamp(19px, 1.3vw, 27px);
      color: var(--muted);
      line-height: 1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .day-name {
      justify-content: flex-start;
      text-align: left;
      padding-left: 1vw;
    }

    .day-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-icon img {
      width: 30px;
      height: 30px;
      object-fit: contain;
      display: block;
      filter: brightness(0) invert(1);
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg" id="bg"></div>
    <div class="overlay"></div>

    <div class="stage">
      <section class="left">
        <h1 class="city">Brescia</h1>
        <div class="condition" id="currentCondition">Caricamento…</div>
        <div class="date" id="dateLine">—</div>

        <div class="temp-main" id="currentTemp">--°</div>
        <div class="minmax-line" id="minMaxLine">Min --° · Max --°</div>

        <div class="left-list">
          <div class="left-item">
            <img src="./icons/thermometer.svg" alt="">
            <span id="feelsLikeLine">Percepita --°</span>
          </div>

          <div class="left-item">
            <img src="./icons/droplet.svg" alt="">
            <span id="humidityLine">Umidità --%</span>
          </div>

          <div class="left-item">
            <img src="./icons/sunrise.svg" alt="">
            <span id="sunriseLine">Alba --:--</span>
          </div>

          <div class="left-item">
            <img src="./icons/sunset.svg" alt="">
            <span id="sunsetLine">Tramonto --:--</span>
          </div>

          <div class="left-item">
            <img src="./icons/moon.svg" alt="">
            <span id="moonLine">Fase lunare</span>
          </div>

          <div class="left-item zodiac">
            <span class="zodiac-symbol" id="zodiacSymbol">♈</span>
            <span id="zodiacName">Ariete</span>
          </div>

          <div class="left-item">
            <img src="./icons/wind.svg" alt="">
            <span id="airLine">Aria AQI --</span>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="card hours-card">
          <div class="hours-grid" id="hoursGrid"></div>
        </div>

        <div class="card days-card">
          <div class="days-grid" id="daysGrid"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const BRESCIA = {
      lat: 45.5416,
      lon: 10.2118,
      tz: 'Europe/Rome'
    };

    const backgrounds = {
      sereno: './images/sole-sereno.jpg',
      pocoNuvoloso: './images/poco-nuvoloso.jpg',
      nuvoloso: './images/nuvoloso.jpg',
      pioggia: './images/pioggia.jpg',
      temporale: './images/temporale.jpg',
      notteSerena: './images/notte-serena.jpg',
      notteNuvolosa: './images/notte-nuvolosa.jpg',
      alba: './images/alba.jpg',
      tramonto: './images/tramonto.jpg',
      nebbia: './images/nebbia.jpg',
      neve: './images/neve.jpg'
    };

    function pad(num) {
      return String(num).padStart(2, '0');
    }

    function formatDateItalian(date) {
      const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
      const mesi = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
      return `${giorni[date.getDay()]} ${date.getDate()} ${mesi[date.getMonth()]}`;
    }

    function formatHour(date) {
      return pad(date.getHours());
    }

    function weekdayName(dateString) {
      const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
      const d = new Date(dateString + 'T12:00:00');
      return giorni[d.getDay()];
    }

    function moonPhaseName(date = new Date()) {
      const synodicMonth = 29.53058867;
      const knownNewMoon = new Date('2000-01-06T18:14:00Z').getTime();
      const days = (date.getTime() - knownNewMoon) / 86400000;
      const phase = ((days % synodicMonth) + synodicMonth) % synodicMonth;
      const index = Math.floor((phase / synodicMonth) * 8) % 8;

      return [
        'Luna nuova',
        'Luna crescente',
        'Primo quarto',
        'Gibbosa crescente',
        'Luna piena',
        'Gibbosa calante',
        'Ultimo quarto',
        'Luna calante'
      ][index];
    }

    function zodiacForDate(date = new Date()) {
      const m = date.getMonth() + 1;
      const d = date.getDate();

      const zodiacs = [
        { start: [3, 21], end: [4, 19], symbol: '♈', name: 'Ariete' },
        { start: [4, 20], end: [5, 20], symbol: '♉', name: 'Toro' },
        { start: [5, 21], end: [6, 20], symbol: '♊', name: 'Gemelli' },
        { start: [6, 21], end: [7, 22], symbol: '♋', name: 'Cancro' },
        { start: [7, 23], end: [8, 22], symbol: '♌', name: 'Leone' },
        { start: [8, 23], end: [9, 22], symbol: '♍', name: 'Vergine' },
        { start: [9, 23], end: [10, 22], symbol: '♎', name: 'Bilancia' },
        { start: [10, 23], end: [11, 21], symbol: '♏', name: 'Scorpione' },
        { start: [11, 22], end: [12, 21], symbol: '♐', name: 'Sagittario' },
        { start: [12, 22], end: [1, 19], symbol: '♑', name: 'Capricorno' },
        { start: [1, 20], end: [2, 18], symbol: '♒', name: 'Acquario' },
        { start: [2, 19], end: [3, 20], symbol: '♓', name: 'Pesci' }
      ];

      for (const z of zodiacs) {
        const [sm, sd] = z.start;
        const [em, ed] = z.end;

        if (sm <= em) {
          if ((m === sm && d >= sd) || (m === em && d <= ed) || (m > sm && m < em)) return z;
        } else {
          if ((m === sm && d >= sd) || (m === em && d <= ed) || (m > sm || m < em)) return z;
        }
      }

      return { symbol: '♈', name: 'Ariete' };
    }

    function getWeatherIcon(code, isDay) {
      if (code === 0) return isDay ? 'sun.svg' : 'moon.svg';
      if ([1, 2].includes(code)) return isDay ? 'partly-cloudy.svg' : 'cloudy-night.svg';
      if (code === 3) return 'cloudy.svg';
      if ([45, 48].includes(code)) return 'cloud.svg';
      if ([51, 53, 55].includes(code)) return 'light-rain.svg';
      if ([61, 63, 65, 80, 81, 82].includes(code)) return 'rain.svg';
      if ([71, 73, 75, 77, 85, 86].includes(code)) return 'snow-flake.svg';
      if ([95].includes(code)) return 'thunder.svg';
      if ([96, 99].includes(code)) return 'storm.svg';
      return 'cloud.svg';
    }

    function getBackgroundKey(code, isDay, now, sunrise, sunset) {
      const mins = now.getHours() * 60 + now.getMinutes();
      const sunriseM = sunrise.getHours() * 60 + sunrise.getMinutes();
      const sunsetM = sunset.getHours() * 60 + sunset.getMinutes();

      if (mins >= sunriseM - 20 && mins <= sunriseM + 35) return 'alba';
      if (mins >= sunsetM - 35 && mins <= sunsetM + 25) return 'tramonto';

      if (!isDay) {
        if (code === 0 || code === 1) return 'notteSerena';
        return 'notteNuvolosa';
      }

      if (code === 0 || code === 1) return 'sereno';
      if (code === 2) return 'pocoNuvoloso';
      if (code === 3) return 'nuvoloso';
      if ([45, 48].includes(code)) return 'nebbia';
      if ([71, 73, 75, 77, 85, 86].includes(code)) return 'neve';
      if ([95, 96, 99].includes(code)) return 'temporale';
      if ([51,53,55,61,63,65,80,81,82].includes(code)) return 'pioggia';

      return 'pocoNuvoloso';
    }

    function getConditionText(code) {
      const map = {
        0: 'Sereno',
        1: 'Prevalentemente sereno',
        2: 'Parzialmente nuvoloso',
        3: 'Nuvoloso',
        45: 'Nebbia',
        48: 'Nebbia',
        51: 'Pioggia leggera',
        53: 'Pioggia',
        55: 'Pioggia intensa',
        61: 'Pioggia',
        63: 'Pioggia',
        65: 'Pioggia intensa',
        71: 'Neve',
        73: 'Neve',
        75: 'Neve intensa',
        77: 'Neve',
        80: 'Rovesci',
        81: 'Rovesci',
        82: 'Forti rovesci',
        95: 'Temporale',
        96: 'Temporale',
        99: 'Temporale forte'
      };
      return map[code] || 'Parzialmente nuvoloso';
    }

    function renderHours(items) {
      const grid = document.getElementById('hoursGrid');
      grid.innerHTML = '';

      items.forEach((item, index) => {
        const col = document.createElement('div');
        col.className = 'hour-col';
        col.innerHTML = `
          <div class="hour-label">${index === 0 ? 'Adesso' : item.label}</div>
          <div class="hour-icon"><img src="./icons/${item.icon}" alt=""></div>
          <div class="hour-temp">${item.temp}°</div>
          <div class="hour-wind">${item.wind} km/h</div>
        `;
        grid.appendChild(col);
      });
    }

    function renderDays(items) {
      const grid = document.getElementById('daysGrid');
      grid.innerHTML = `
        <div class="days-head left-empty">.</div>
        <div class="days-head"></div>
        <div class="days-head">Min</div>
        <div class="days-head">Max</div>
        <div class="days-head">Vento</div>
      `;

      items.forEach(item => {
        grid.insertAdjacentHTML('beforeend', `
          <div class="day-cell day-name">${item.day}</div>
          <div class="day-cell day-icon"><img src="./icons/${item.icon}" alt=""></div>
          <div class="day-cell">${item.min}°</div>
          <div class="day-cell">${item.max}°</div>
          <div class="day-cell">${item.wind} km/h</div>
        `);
      });
    }

    async function init() {
      try {
        const weatherUrl =
          `https://api.open-meteo.com/v1/forecast?latitude=${BRESCIA.lat}&longitude=${BRESCIA.lon}` +
          `&timezone=${encodeURIComponent(BRESCIA.tz)}` +
          `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,is_day` +
          `&hourly=temperature_2m,weather_code,wind_speed_10m` +
          `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,wind_speed_10m_max`;

        const airUrl =
          `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${BRESCIA.lat}&longitude=${BRESCIA.lon}` +
          `&timezone=${encodeURIComponent(BRESCIA.tz)}` +
          `&current=european_aqi`;

        const [weatherRes, airRes] = await Promise.all([
          fetch(weatherUrl, { cache: 'no-store' }),
          fetch(airUrl, { cache: 'no-store' })
        ]);

        if (!weatherRes.ok) throw new Error('Errore meteo');
        if (!airRes.ok) throw new Error('Errore aria');

        const data = await weatherRes.json();
        const airData = await airRes.json();

        const now = new Date();
        const sunrise = new Date(data.daily.sunrise[0]);
        const sunset = new Date(data.daily.sunset[0]);

        document.getElementById('currentCondition').textContent = getConditionText(data.current.weather_code);
        document.getElementById('dateLine').textContent = formatDateItalian(now);
        document.getElementById('currentTemp').textContent = `${Math.round(data.current.temperature_2m)}°`;
        document.getElementById('minMaxLine').textContent =
          `Min ${Math.round(data.daily.temperature_2m_min[0])}° · Max ${Math.round(data.daily.temperature_2m_max[0])}°`;

        document.getElementById('feelsLikeLine').textContent =
          `Percepita ${Math.round(data.current.apparent_temperature)}°`;

        document.getElementById('humidityLine').textContent =
          `Umidità ${Math.round(data.current.relative_humidity_2m)}%`;

        document.getElementById('sunriseLine').textContent =
          `Alba ${pad(sunrise.getHours())}:${pad(sunrise.getMinutes())}`;

        document.getElementById('sunsetLine').textContent =
          `Tramonto ${pad(sunset.getHours())}:${pad(sunset.getMinutes())}`;

        document.getElementById('moonLine').textContent = moonPhaseName(now);

        const zodiac = zodiacForDate(now);
        document.getElementById('zodiacSymbol').textContent = zodiac.symbol;
        document.getElementById('zodiacName').textContent = zodiac.name;

        const aqi = airData?.current?.european_aqi;
        document.getElementById('airLine').textContent =
          aqi != null ? `Aria AQI ${Math.round(aqi)}` : 'Aria AQI n.d.';

        const bgKey = getBackgroundKey(
          data.current.weather_code,
          data.current.is_day === 1,
          now,
          sunrise,
          sunset
        );
        document.getElementById('bg').style.backgroundImage = `url('${backgrounds[bgKey]}')`;

        const times = data.hourly.time.map(t => new Date(t));
        let startIdx = times.findIndex(t => t.getHours() === now.getHours() && t.getDate() === now.getDate());
        if (startIdx < 0) startIdx = 0;

        const hourlyItems = [];

        hourlyItems.push({
          label: 'Adesso',
          icon: getWeatherIcon(data.current.weather_code, data.current.is_day === 1),
          temp: Math.round(data.current.temperature_2m),
          wind: Math.round(data.current.wind_speed_10m)
        });

        for (let i = 1; i < 5; i++) {
          const idx = Math.min(startIdx + i, times.length - 1);
          const t = times[idx];
          const isDayForHour = t >= sunrise && t < sunset;

          hourlyItems.push({
            label: formatHour(t),
            icon: getWeatherIcon(data.hourly.weather_code[idx], isDayForHour),
            temp: Math.round(data.hourly.temperature_2m[idx]),
            wind: Math.round(data.hourly.wind_speed_10m[idx])
          });
        }

        renderHours(hourlyItems);

        const dailyItems = [];
        for (let i = 0; i < 5; i++) {
          dailyItems.push({
            day: weekdayName(data.daily.time[i]),
            icon: getWeatherIcon(data.daily.weather_code[i], true),
            min: Math.round(data.daily.temperature_2m_min[i]),
            max: Math.round(data.daily.temperature_2m_max[i]),
            wind: Math.round(data.daily.wind_speed_10m_max[i])
          });
        }
        renderDays(dailyItems);

      } catch (err) {
        console.error(err);
        document.getElementById('currentCondition').textContent = 'Meteo non disponibile';
      }
    }

    init();
    setInterval(init, 10 * 60 * 1000);
  </script>
</body>
</html>
